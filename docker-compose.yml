services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./server
    environment:
      PORT: 3000
      DATABASE_URL: postgres://chatapp:chatapp@db:5432/chatapp
      CLIENT_ORIGIN: http://localhost:8080
    depends_on:
      - db
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
